<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InfluMatch | Local Collaboration Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app"></div>

  <template id="landing-template">
    <main class="landing">
      <nav class="topbar">
        <button class="brand" data-view="landing" aria-label="Go to landing page">
          <span class="brand-mark">IM</span>
          <span>InfluMatch</span>
        </button>
        <div class="topbar-actions">
          <button class="ghost-btn" data-view="login">Login</button>
          <button class="primary-btn" data-view="signup">Sign up</button>
        </div>
      </nav>

      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">College project prototype</p>
          <h1>InfluMatch</h1>
          <p class="hero-text">
            A simple platform where local businesses post promotion campaigns
            and influencers apply for collaborations that match their niche and city.
          </p>
          <div class="hero-stats" aria-label="Prototype highlights">
            <div><strong>2</strong><span>User roles</span></div>
            <div><strong>4</strong><span>Demo steps</span></div>
            <div><strong>100%</strong><span>Local data</span></div>
          </div>
          <div class="hero-actions">
            <button class="primary-btn large" data-auth-role="business">Join as Business</button>
            <button class="secondary-btn large" data-auth-role="influencer">Join as Influencer</button>
          </div>
        </div>
        <div class="hero-visual" aria-label="InfluMatch workflow preview">
          <div class="visual-topline">
            <span class="live-dot"></span>
            <span>Live collaboration board</span>
          </div>
          <div class="visual-card campaign-preview">
            <span class="mini-label">Cafe campaign</span>
            <strong>Launch weekend offer</strong>
            <p>Food • Mumbai • Rs. 8,000</p>
          </div>
          <div class="visual-card influencer-preview">
            <span class="avatar">AR</span>
            <div>
              <strong>Aarav Rao</strong>
              <p>Food blogger • 24K followers</p>
            </div>
          </div>
          <div class="match-line">
            <span>Category match</span>
            <strong>92%</strong>
          </div>
          <div class="visual-card status-preview">
            <span class="mini-label">Application</span>
            <strong>Accepted</strong>
          </div>
        </div>
      </section>

      <section class="steps" aria-label="How InfluMatch works">
        <article>
          <span class="step-number">1</span>
          <h2>Businesses post</h2>
          <p>Create campaigns with budget, location, category, and collaboration details.</p>
        </article>
        <article>
          <span class="step-number">2</span>
          <h2>Influencers apply</h2>
          <p>Influencers filter opportunities and apply to campaigns that fit their profile.</p>
        </article>
        <article>
          <span class="step-number">3</span>
          <h2>Applications move</h2>
          <p>Businesses accept or reject applications and can contact selected influencers.</p>
        </article>
      </section>
    </main>
  </template>

  <script src="app.js"></script>
</body>
</html>
